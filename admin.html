<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Mannan Media</title>

<link rel="stylesheet" href="css/style.css">

<style>
body{
    background:#f5f5f5;
    font-family:Arial,sans-serif;
}

.admin-box{
    max-width:900px;
    margin:30px auto;
    background:#fff;
    padding:25px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

input,select,textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;
}

button{
    background:#b00000;
    color:#fff;
    border:none;
    padding:12px 25px;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#8b0000;
}
</style>

</head>

<body>

<div class="admin-box">

<h1>Mannan Media Admin</h1>

<p>Publish a News Article</p>

<input type="text" placeholder="News Headline">

<select>
<option>Select Category</option>
<option>Politics</option>
<option>Tamil Nadu</option>
<option>Cinema</option>
<option>Sports</option>
<option>Technology</option>
<option>World</option>
</select>

<input type="text" placeholder="Image URL">

<textarea rows="8" placeholder="Write your news here..."></textarea>

<label>
<input type="checkbox">
Breaking News
</label>

<br><br>

<button onclick="publishNews()">Publish News</button>

</div>

<script>

function publishNews(){

alert("News Published Successfully! (Demo)");

}

</script>

</body>
</html>
